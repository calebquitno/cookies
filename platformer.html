<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Platformer</title>

<style>
body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    background:#87CEEB;
    border:3px solid white;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.6;

const keys = {};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

const player = {
    x:50,
    y:50,
    w:30,
    h:40,
    vx:0,
    vy:0,
    grounded:false
};

const goal = {
    x:830,
    y:90,
    w:30,
    h:30
};

const platforms = [

    {x:0,y:470,w:900,h:30},

    {x:150,y:400,w:120,h:20},
    {x:330,y:340,w:140,h:20},
    {x:520,y:270,w:120,h:20},
    {x:700,y:180,w:120,h:20}

];

function collide(a,b){

    return(
        a.x < b.x+b.w &&
        a.x+a.w > b.x &&
        a.y < b.y+b.h &&
        a.y+a.h > b.y
    );
}

function update(){

    // Movement
    if(keys["ArrowLeft"] || keys["a"])
        player.vx=-5;
    else if(keys["ArrowRight"] || keys["d"])
        player.vx=5;
    else
        player.vx*=0.8;

    // Jump
    if((keys[" "]||keys["ArrowUp"]||keys["w"]) && player.grounded){
        player.vy=-12;
        player.grounded=false;
    }

    player.vy+=gravity;

    player.x+=player.vx;
    player.y+=player.vy;

    player.grounded=false;

    // Platform collisions
    for(let p of platforms){

        if(collide(player,p)){

            // Landing on top
            if(player.vy>0 &&
               player.y+player.h-player.vy <= p.y){

                player.y=p.y-player.h;
                player.vy=0;
                player.grounded=true;
            }
        }
    }

    // Keep inside screen
    if(player.x<0) player.x=0;
    if(player.x+player.w>canvas.width)
        player.x=canvas.width-player.w;

    // Win
    if(collide(player,goal)){
        alert("You Win!");
        player.x=50;
        player.y=50;
        player.vx=0;
        player.vy=0;
    }

}

function draw(){

    // Sky
    ctx.fillStyle="#87CEEB";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Platforms
    ctx.fillStyle="#5b3a29";
    for(let p of platforms)
        ctx.fillRect(p.x,p.y,p.w,p.h);

    // Goal
    ctx.fillStyle="gold";
    ctx.fillRect(goal.x,goal.y,goal.w,goal.h);

    // Player
    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,player.w,player.h);

}

function loop(){

    update();
    draw();
    requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
